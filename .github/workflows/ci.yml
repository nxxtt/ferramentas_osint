name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pip install poetry==2.4.1
      - name: Cache Poetry deps
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: poetry-lint-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-lint-${{ matrix.python-version }}-
      - name: Install dependencies
        run: poetry install --with dev
      - name: Lint
        run: poetry run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pip install poetry==2.4.1
      - name: Cache Poetry deps
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: poetry-type-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-type-${{ matrix.python-version }}-
      - name: Install dependencies
        run: poetry install --with dev
      - name: Type check
        run: poetry run basedpyright

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pip install poetry==2.4.1
      - name: Cache Poetry deps
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: poetry-test-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-test-${{ matrix.python-version }}-
      - name: Install dependencies
        run: poetry install --with dev
      - name: Tests
        run: poetry run pytest tests/ -v
