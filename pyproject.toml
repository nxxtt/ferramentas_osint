[tool.poetry]
name = "mytools"
version = "3.2.0"
description = "Suite de ferramentas de auditoria e reconhecimento web/network"
authors = ["nxt"]
readme = "README.MD"
packages = [{include = "*.py"}]

[tool.poetry.dependencies]
python = ">=3.10,<3.15"
requests = ">=2.34.2"
beautifulsoup4 = ">=4.15.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=9.0.3"
responses = ">=0.26.1"
ruff = ">=0.15.17"

[tool.poetry.scripts]
mytools = "main:main"
mytools-port = "portscanner:main"
mytools-dir = "dirscanner:main"
mytools-recon = "webrecon:main"
mytools-audit = "attackaudit:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py310"
line-length = 160

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]
