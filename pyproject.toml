[tool.poetry]
name = "mytools"
version = "3.2.0"
description = "Suite de ferramentas de auditoria e reconhecimento web/network"
authors = ["nxt"]
readme = "README.MD"
packages = [{include = "*.py"}]

[tool.poetry.dependencies]
python = ">=3.10,<3.15"
httpx = ">=0.28.1"
beautifulsoup4 = ">=4.15.0"
python-whois = ">=0.9.6"
dnspython = ">=2.8.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=9.1.0"
respx = ">=0.23.1"
pytest-asyncio = ">=1.4.0"
ruff = ">=0.15.17"
mypy = ">=2.1.0"

[tool.poetry.scripts]
mytools = "main:main"
mytools-port = "portscanner:main"
mytools-dir = "dirscanner:main"
mytools-recon = "webrecon:main"
mytools-audit = "attackaudit:main"
mytools-dnsxfer = "dnstransfer:main"
mytools-subenum = "subdomainenum:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py310"
line-length = 160

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
